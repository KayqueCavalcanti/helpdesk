services:
  - type: web
    name: central-de-ajuda
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_HOURS
        value: "24"
      - key: DATABASE_URL
        fromDatabase:
          name: central-de-ajuda-db
          property: connectionString

databases:
  - name: central-de-ajuda-db
    plan: free
